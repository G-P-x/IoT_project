# =============================================================================
# Gateway Digital Replica Template
# =============================================================================
# This YAML defines the structure of a Gateway DR — the virtual representation
# of a physical edge gateway/device that collects sensor data in the field
# (e.g. on Mt. Etna).
#
# Following the lecture pattern, the schema is divided into:
#   - common_fields : identity + profile + metadata (shared structure)
#   - entity.data   : domain-specific payload (sensors, status, measurements)
#   - validations   : mandatory fields, type constraints, and defaults
# =============================================================================

schemas:
  common_fields:
    # "_id" generated by DRFactory; MongoDB enforces uniqueness
    dr_type: str                       # DR type identifier ("gateway")
    profile:
      name: str                     # Human-readable gateway name
      description: str              # Optional description
      device_id: str                # Physical device identifier (MAC / serial)
      location: str                 # Deployment location (e.g. "Mt. Etna - North face")
    metadata:
      created_at: datetime          # When this DR was created
      last_update: datetime         # Last modification timestamp
      status: str                   # Operational status (active/inactive/maintenance)

  entity:
    data:
      sensors: List[str]            # List of sensor DR IDs attached to this gateway
      actuators: List[str]          # List of actuator DR IDs attached to this gateway (if any)
      last_heartbeat: str           # ISO timestamp of last heartbeat from the device

  validations:
    mandatory_fields:
      root:
        # "_id" generated by DRFactory; MongoDB enforces uniqueness
        - dr_type
      profile:
        - name
        - device_id
      metadata:
        - created_at
        - last_update
        - status
      entity.data:
        - sensors
        - actuators

    type_constraints:
      dr_type:
        type: str
        enum: ["gateway"]
      status:
        type: str
        enum: ["active", "inactive", "maintenance"] # repetion with operational_status, maybe we can merge them into a single field?
      sensors:
        type: List[str]
      actuators:
        type: List[str]
      last_heartbeat:
        type: str
        format: date-time

    initialization:
      root:
        dr_type: "gateway"
      metadata:
        status: "active"
      entity.data:
        sensors: []
        actuators: []
