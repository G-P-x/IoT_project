# =============================================================================
# Sensor Readings History Collection Template
# =============================================================================
# This YAML defines an append-only collection used to store sensor readings
# over time.
#
# The collection keeps the current sensor document separate from its historical
# timeline. Each document represents a single sensor reading, so the timeline can
# be reconstructed by sorting events by timestamp.
# =============================================================================

schemas:
  common_fields:
    _id: str                     # generated by HistoryFactory; MongoDB enforces uniqueness
    record_type: str                # DR record type identifier ("t1", "aq1", "sw1", etc.)
    device_id: str                 # DR id got from the payload.
    unit: str                      # Measurement unit (°C, AQI, m/s)
    gateway_id: str               # DR _id of the gateway this sensor is attached to
    timestamp: datetime           # Time at which the reading was observed


  entity:
    data:
      value: float | None           # Sensor reading value
      threshold: float | None       # Threshold value for the sensor
      source: str                   # Origin of the reading (monitor, operator, recovery)
      status: str                   # Status of the sensor at the time of reading (e.g., "active", "inactive")
      operator_id: str | None       # If source is "operator", the ID of the operator who triggered the reading, else None
      alert_level: str | None       # Optional alert level (e.g. "normal", "warning", "critical")

  validations:
    mandatory_fields:
      root:
        - _id
        - record_type
        - device_id
        - gateway_id
        - timestamp
      data:
        - value
        - status
        - source
        - operator_id

    type_constraints:
      _id:
        type: str
      record_type:
        type: str
        enum: ["t1", "t2", "t3", "aq1", "aq2", "sw1"]
      device_id:
        type: str
      gateway_id:
        type: str
      timestamp:
        type: datetime
      value:
        type: float | None
      status:
        type: str
        enum: ["active", "inactive"]
      source:
        type: str
        enum: ["telemetry", "operator"]
      operator_id:
        type: str | None
      alert_level:
        type: str | None
        enum: ["normal", "warning", "critical", None]

    initialization:
      root:
        record_type: "t1"  # Default record type; can be overridden when creating a new record

    