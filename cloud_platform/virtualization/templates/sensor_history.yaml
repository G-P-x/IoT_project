# =============================================================================
# Sensor Readings History Collection Template
# =============================================================================
# Modifiche rispetto alla versione precedente:
#   - Aggiunti data.threshold, data.severity, data.message
#     per tracciare il contesto completo di ogni lettura storica.
# =============================================================================

schemas:
  common_fields:
    _id: str
    record_type: str
    device_id: str
    gateway_id: str
    timestamp: datetime

  entity:
    data:
      value: float | None     # Valore letto dal sensore
      threshold: float | None # Soglia critica al momento della lettura
      severity: str           # Severità: none / critical / error
      message: str            # Messaggio descrittivo dal gateway
      source: str             # Origine: telemetry / operator
      status: str             # Stato sensore: active / inactive
      operator_id: str | None # ID operatore se source=operator, altrimenti null

  validations:
    mandatory_fields:
      root:
        - _id
        - record_type
        - device_id
        - gateway_id
        - timestamp
      data:
        - value
        - status
        - source
        - operator_id

    type_constraints:
      _id:
        type: str
      record_type:
        type: str
        enum: ["sensor_reading_event"]
      device_id:
        type: str
      gateway_id:
        type: str
      timestamp:
        type: datetime
      value:
        type: float | None
        nullable: true
      threshold:
        type: float | None
        nullable: true
      severity:
        type: str
      message:
        type: str
      status:
        type: str
        enum: ["active", "inactive"]
      source:
        type: str
        enum: ["telemetry", "operator"]
      operator_id:
        type: str | None
        nullable: true

    initialization:
      root:
        record_type: "sensor_reading_event"