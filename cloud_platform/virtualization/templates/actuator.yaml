
schemas:
 
  common_fields:
    # "_id" managed by mongo db
    dr_type: str                       # DR type identifier ("actuator")
    profile:
      name: str                     # Human-readable actuator name
      device_id: str              # Physical actuator identifier (e.g. "84F3EB12A0BC-siren1")
      device_type: str            # Kind of actuator (siren, valve, camera, light, relay)
      description: str              # Optional description
      gateway_id: str               # DR _id of the gateway this actuator is attached to
      location: str                 # Deployment location (e.g. "Mt. Etna - North face")

    metadata:
      created_at: datetime          # ISO timestamp of when this DR was created 
      last_update: datetime          # ISO timestamp of the latest command executed on the actuator
      status: str                   # Actuator operational status
      

  entity:
    data:
      current_command: str             # Last command that was sent to this actuator

  validations:
    mandatory_fields:
      root:
        # "_id" managed by mongo db
        - dr_type
      profile:
        - name
        - device_id
        - device_type
        - gateway_id # enforce DR_id reference to a gateway
      metadata:
        - created_at
        - last_update
        - status
      entity.data:
        - current_command

    type_constraints:
      dr_type:
        type: str
        enum: ["actuator"]
      name:
        type: str
      device_id:
        type: str
      device_type:
        type: str
        enum: ["siren", "valve", "camera", "light", "relay"]
      description:
        type: str
      gateway_id:
        type: str
      created_at:
        type: datetime
      last_update:
        type: datetime
      status:
        type: str
        enum: ["active", "inactive", "faulty", "maintenance"]
      current_command:
        type: str

    initialization:
      root:
        dr_type: "actuator"
      profile:
        name: "actuator"
      metadata:
        status: "active"
