# =============================================================================
# Digital Twin Template (Monitoring Station)
# =============================================================================
# Questo YAML definisce il Digital Twin aggregato di un sito di monitoraggio.
# Raggruppa lo stato corrente del Gateway e di tutti i dispositivi ad esso collegati,
# ottimizzato per operazioni di "update-in-place" su MongoDB tramite dot-notation.
# =============================================================================

schemas:
  common_fields:
    _id: str                           # ID univoco del Twin (es. "twin_etna_nord")
    name: str                          # Nome univoco del Twin (es. "Stazione Etna Nord")
    description: str                   # Descrizione del Twin (es. "Stazione Etna Nord") 
    metadata:
      created_at: datetime             # Creazione del contenitore Digital Twin
      updated_at: datetime             # Ultimo aggiornamento di QUALSIASI componente
      status: str                      # Stato globale (es. "ok", "warning", "offline") 
    services: List[str]                # Lista degli ID dei servizi associati al Twin 
    sensors:                  # lista dei digital replica associati al twin
      - _id_document: str              # ID univoco del DR
        dr_type: str                   # DR type identifier (es. "sensor")
        device_id: str                # Identificatore fisico del sensore
        device_type: str              # Tipo di sensore (es. "temperature", "humidity", "pressure")
        current_value: str | None #       # Valore corrente del sensore (es. "23.5 °C")
        threshold: float | None
        alert_level: str              # Livello di allerta  
    actuators:                # lista dei digital replica associati al twin
      - _id_document: str              # ID univoco del DR
        dr_type: str                   # DR type identifier (es. "actuator")
        device_id: str                # Identificatore fisico dell'attuatore
        device_type: str              # Tipo di attuatore (es. "siren", "valve", "camera", "light", "relay")
        available_commands: List[str] | None   # Lista dei comandi disponibili per l'attuatore 

    

  validations:
    mandatory_fields:
      root:
        - _id
        - name
      metadata:
        - created_at
        - updated_at
        - status

    type_constraints:
      status:
        type: str
        enum: ["OK", "OFFLINE", "MAINTENANCE", "WARNING", "CRITICAL"]

    initialization:
      root:
        name: "etna"
        description: "default"
        services: []
        sensors: []
        actuators: []
        digital_replicas: []
      metadata:
        status: "OK"