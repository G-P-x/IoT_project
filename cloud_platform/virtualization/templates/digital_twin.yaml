# =============================================================================
# Digital Twin Template (Monitoring Station)
# =============================================================================
# Questo YAML definisce il Digital Twin aggregato di un sito di monitoraggio.
# Raggruppa lo stato corrente del Gateway e di tutti i dispositivi ad esso collegati,
# ottimizzato per operazioni di "update-in-place" su MongoDB tramite dot-notation.
# =============================================================================

schemas:
  common_fields:
    _id: str                           # ID univoco del Twin (es. "twin_etna_nord")
    name: str                          # Nome univoco del Twin (es. "Stazione Etna Nord")
    description: str                   # Descrizione del Twin (es. "Stazione Etna Nord")  
    services: List[str]                # Lista degli ID dei servizi associati al Twin 
    digital_replicas:                  # lista dei digital replica associati al twin 
      - type: str                      # DR type
        id: str                        # DR id

    metadata:
      created_at: datetime             # Creazione del contenitore Digital Twin
      updated_at: datetime             # Ultimo aggiornamento di QUALSIASI componente
      status: str                      # Stato globale (es. "ok", "warning", "offline")

  validations:
    mandatory_fields:
      root:
        - _id
        - name
      metadata:
        - created_at
        - updated_at
        - status

    type_constraints:
      status:
        type: str
        enum: ["OK", "OFFLINE", "MAINTENANCE", "WARNING", "CRITICAL"]

    initialization:
      root:
        name: "etna"
        description: "default"
        services: []
        digital_replicas: []
      metadata:
        status: "OK"