# =============================================================================
# Digital Twin Template (Monitoring Station)
# =============================================================================
# Questo YAML definisce il Digital Twin aggregato di un sito di monitoraggio.
# Raggruppa lo stato corrente del Gateway e di tutti i dispositivi ad esso collegati,
# ottimizzato per operazioni di "update-in-place" su MongoDB tramite dot-notation.
# =============================================================================

schemas:
  common_fields:
    _id: str                           # ID univoco del Twin (es. "twin_etna_nord")
    profile:
      name: str                        # Nome logico della stazione (es. "Stazione Etna Nord")
      primary_gateway_id: str          # MAC del gateway principale di questa stazione
      location: str                    # Posizione (es. "Mt. Etna - North face"), opzionale
      description: str                 # Opzionale
    metadata:
      created_at: datetime             # Creazione del contenitore Digital Twin
      last_system_update: datetime     # Ultimo aggiornamento di QUALSIASI componente
      overall_status: str              # Stato globale (es. "ok", "warning", "offline")

  entity:
    state:
      gateway:
        status: str                    # Copia dello stato attuale del gateway
        last_heartbeat: str            # ISO timestamp
      
      # Usiamo un Dizionario (Mappa) indicizzato per device_id o _id del sensore
      # Questo permette aggiornamenti O(1) su MongoDB via dot-notation
      sensors: Dict[str, dict]         
        # Esempio del contenuto interno al dizionario per singola chiave:
        # current_value: float | None
        # status: str
        # last_update: datetime
      
      actuators: Dict[str, dict]
        # Esempio del contenuto interno:
        # current_command: str
        # status: str
        # last_update: datetime

  validations:
    mandatory_fields:
      root:
        - _id
      profile:
        - name
        - primary_gateway_id
      metadata:
        - created_at
        - last_system_update
        - overall_status
      entity.state:
        - gateway
        - sensors
        - actuators

    type_constraints:
      overall_status:
        type: str
        enum: ["OK", "OFFLINE", "MAINTENANCE", "WARNING", "CRITICAL"]
      sensors:
        type: dict  # Chiave: Sensor ID, Valore: Oggetto stato sensore
      actuators:
        type: dict  # Chiave: Actuator ID, Valore: Oggetto stato attuatore

    initialization:
      metadata:
        overall_status: "OK"
      entity.state:
        gateway:
          status: "inactive"
          last_heartbeat: null
        sensors: {}
        actuators: {}