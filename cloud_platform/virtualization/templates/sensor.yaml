# =============================================================================
# Sensor Digital Replica Template
# =============================================================================
# This YAML defines the structure of a Sensor DR — the virtual representation
# of a physical sensor deployed on a gateway (e.g. temperature probe, air
# quality monitor, seismograph).
#
# Design note: In the lecture's winery example, the equivalent entities are
# "bottle" and "room". Here we use "sensor" and "gateway" to match the
# volcanic monitoring domain.
# =============================================================================

schemas:
  common_fields:
    _id: str                        # MongoDB document ID (UUID)
    dr_type: str                       # DR type identifier ("sensor")
    profile:
      name: str                     # Human-readable sensor name
      device_id: str                # Physical sensor identifier (e.g. "84F3EB12A0BC-t1")
      device_type: str              # Kind of sensor (temperature, air_quality, seismic_waves)
      unit: str                     # Measurement unit (°C, AQI, mm/s)
      description: str              # Optional description
      gateway_id: str               # DR _id of the gateway this sensor is attached to
      location: str                 # Deployment location (e.g. "Mt. Etna - North face")
    metadata:
      created_at: datetime          # ISO timestamp of when this DR was created
      last_update: datetime          # ISO timestamp of the latest reading
      status: str                   # Sensor operational status
      

  entity:
    data:
      current_value: float          # Latest reading from the sensor
      alert_threshold_min: float    # Below this value → alert
      alert_threshold_max: float    # Above this value → alert

  validations:
    mandatory_fields:
      root:
        - _id
        - dr_type
      profile:
        - name
        - device_id
        - device_type
        - gateway_id # enforce DR_id reference to a gateway
      metadata:
        - created_at
        - last_update
        - status
      entity.data:
        - current_value

    type_constraints:
      _id:
        type: str
      dr_type:
        type: str
        enum: ["sensor"]
      name:
        type: str
      device_id:
        type: str
      device_type:
        type: str
        enum: ["temperature", "air_quality", "seismic_waves", "humidity", "gas"]
      unit:
        type: str
      description:
        type: str
      gateway_id:
        type: str
      created_at:
        type: datetime
      last_update:
        type: datetime
      status:
        type: str
        enum: ["active", "inactive", "faulty", "calibrating"]
      current_value:
        type: float
      alert_threshold_min:
        type: float
      alert_threshold_max:
        type: float

    initialization:
      root:
        dr_type: "sensor"
      profile:
        name: "sensor"
      metadata:
        status: "active"
