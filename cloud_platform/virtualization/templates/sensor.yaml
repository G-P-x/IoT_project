# =============================================================================
# Sensor Digital Replica Template
# =============================================================================
# Modifiche rispetto alla versione precedente:
#   - data.current_value → data.value  (allineato con il payload del gateway)
#   - data.alert_threshold_min/max → data.threshold  (soglia critica singola)
#   - Aggiunti data.severity e data.message  (arrivano dal gateway embedded)
# =============================================================================

schemas:
  common_fields:
    _id: str
    dr_type: str
    profile:
      name: str
      device_id: str
      device_type: str
      unit: str
      description: str
      gateway_id: str
      location: str
    metadata:
      created_at: datetime
      last_update: datetime
      status: str

  entity:
    data:
      value: float | None       # Ultima lettura del sensore
      threshold: float | None   # Soglia critica configurata (da Config.h dell'ESP)
      severity: str             # Severità dell'ultima lettura (none/critical/error)
      message: str              # Messaggio descrittivo dell'ultima lettura

  validations:
    mandatory_fields:
      root:
        - _id
        - dr_type
      profile:
        - name
        - device_id
        - device_type
        - gateway_id
      metadata:
        - created_at
        - last_update
        - status
      entity.data: []

    type_constraints:
      dr_type:
        type: str
        enum: ["sensor"]
      name:
        type: str
      device_id:
        type: str
      device_type:
        type: str
        enum: ["temperature", "air_quality", "seismic_waves", "humidity", "gas", "unknown"]
      unit:
        type: str
      description:
        type: str
      gateway_id:
        type: str
      location:
        type: str
      created_at:
        type: datetime
      last_update:
        type: datetime
      status:
        type: str
        enum: ["active", "inactive", "faulty", "calibrating"]
      value:
        type: float | None
        nullable: true
      threshold:
        type: float | None
        nullable: true
      severity:
        type: str
      message:
        type: str

    initialization:
      root:
        dr_type: "sensor"
      profile:
        name: "sensor"
        gateway_id: "gateway_01"
      metadata:
        status: "active"