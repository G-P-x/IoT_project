# =============================================================================
# Gateway Status History Collection Template
# =============================================================================
# This YAML defines an append-only collection used to store gateway status
# transitions over time.
#
# The collection keeps the current gateway document separate from its historical
# timeline. Each document represents a single status event, so the timeline can
# be reconstructed by sorting events by timestamp.
# =============================================================================

schemas:
  common_fields:
    _id: str                     # generated by HistoryFactory; MongoDB enforces uniqueness
    record_type: str                # Record type identifier ("gateway_status_event")
    device_id: str                 # DR _id of the gateway this event belongs to
    timestamp: datetime            # Time at which the status was observed

  entity:
    data:
      status: str                   # Gateway status at this point in time
      source: str                   # Origin of the event (monitor, operator, recovery)
      operator_id: str | None       # Optional identifier of the operator who triggered the status change (if applicable)

  validations:
    mandatory_fields:
      root:
        - _id
        - record_type
        - device_id
        - timestamp
      data:
        - status
        - source

    type_constraints:
      _id:
        type: str
      record_type:
        type: str
        enum: ["gateway_status_event"]
      timestamp:
        type: datetime
      status:
        type: str
        enum: ["active", "inactive"]
      source:
        type: str
        enum: ["telemetry", "operator"]
      operator_id:
        type: str | None

    initialization:
      root:
        record_type: "gateway_status_event"